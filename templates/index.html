<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pyresparser</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>


<body>
  
    <nav class="parser-navbar">
        <div class="navbar-brand">
            <h1><i class="fas fa-file-contract"></i> Resume Parser</h1>
        </div>
        
        <div class="navbar-controls">
        
            <div class="nav-status-badge" id="navStatus">
                <i class="fas fa-circle"></i> Ready
            </div>
            
            <div class="nav-upload-area" id="navUploadArea">
                <i class="fas fa-cloud-upload-alt"></i>
                <span id="fileName">Upload Resume</span>
                <input type="file" id="resumeFile" name="resume" accept=".pdf,.docx,.doc,.png,.jpg,.jpeg" required>
            </div>
            
          
            <div class="nav-section-select">
                <div class="select-wrapper">
                    <select name="section" id="sectionSelect" required>
                        <option value="">Select section</option>
                    </select>
                    <span id="detectedSections" class="detected-sections-inline"></span>
                </div>
            </div>
        </div>
    </nav>


    <div class="parser-container">
        <div class="main-content" id="mainContent">
            
         
            <div class="left-column" id="leftColumn">
                
                {% if overall_accuracy %}
                <div class="accuracy-section">
                    <div class="accuracy-header">
                        <h3><i class="fas fa-chart-pie"></i> Confidence</h3>
                        <span class="accuracy-badge">{{ overall_accuracy }}%</span>
                    </div>
                    <div class="confidence-grid">
                        <div class="confidence-item">
                            <label>Text</label>
                            <div class="progress">
                                <div class="progress-bar bg-primary" id="textConfidenceBar" role="progressbar"
                                    style="width: 0%"></div>
                            </div>
                            <div class="confidence-value">
                                <span></span>
                                <span id="textConfidenceValue">0%</span>
                            </div>
                        </div>
                        <div class="confidence-item">
                            <label>Skills</label>
                            <div class="progress">
                                <div class="progress-bar bg-success" id="skillsConfidenceBar" role="progressbar"
                                    style="width: 0%"></div>
                            </div>
                            <div class="confidence-value">
                                <span></span>
                                <span id="skillsConfidenceValue">0%</span>
                            </div>
                        </div>
                        <div class="confidence-item">
                            <label>Education</label>
                            <div class="progress">
                                <div class="progress-bar bg-info" id="educationConfidenceBar" role="progressbar"
                                    style="width: 0%"></div>
                            </div>
                            <div class="confidence-value">
                                <span></span>
                                <span id="educationConfidenceValue">0%</span>
                            </div>
                        </div>
                        <div class="confidence-item">
                            <label>Experience</label>
                            <div class="progress">
                                <div class="progress-bar bg-warning" id="projectsConfidenceBar" role="progressbar"
                                    style="width: 0%"></div>
                            </div>
                            <div class="confidence-value">
                                <span></span>
                                <span id="projectsConfidenceValue">0%</span>
                            </div>
                        </div>
                    </div>
                </div>
                {% endif %}

                
                <div id="loadingIndicator" class="results-card" style="display: none;">
                    <div class="loading-overlay">
                        <div class="loading-spinner"></div>
                        <p class="loading-text" id="loadingText">Processing...</p>
                    </div>
                </div>

              
                <div id="resultBox" class="results-card" style="display: none;">
                    <div class="results-header">
                        <h3><i class="fas fa-clipboard-list"></i> Extraction Results</h3>
                        <span id="confidencePill" class="confidence-pill high">Confidence: 0%</span>
                    </div>
                    <div class="results-body">
                        <div class="results-content" id="resultsContent"></div>
                        <div class="correction-box" id="correctionBox" style="display: none;">
                            <h4><i class="fas fa-edit"></i> Submit Correction</h4>
                            <div class="correction-input-group">
                                <input type="text" id="correctedValue" placeholder="Enter corrected value">
                                <button type="button" id="submitCorrection">Submit</button>
                            </div>
                            <p class="correction-original">Original: <span id="originalValue"></span></p>
                        </div>
                    </div>
                </div>
            </div>

       
            <div class="right-column" id="rightColumn" style="display: none;">
                
                <div id="fullTextViewBox" class="upload-card" style="display: none;">
                    <h3 class="upload-card-title"><i class="fas fa-file-alt"></i> Full Resume Text</h3>
                    <div id="fullTextViewContent" class="full-text-view-content"></div>
                </div>

                <div id="tableViewBox" class="upload-card">
                    <h3 class="upload-card-title"><i class="fas fa-table"></i> Sections Table</h3>
                    <div id="tableViewContent" class="table-view-content"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const defaultSections = [
            { value: "name", label: "Name" },
            { value: "summary", label: "Professional Summary" },
            { value: "skills", label: "Skills" },
            { value: "education", label: "Education" },
            { value: "experience", label: "Work Experience" },
            { value: "projects", label: "Projects" },
            { value: "certifications", label: "Certifications" },
            { value: "awards", label: "Awards & Achievements" },
            { value: "languages", label: "Languages" },
            { value: "interests", label: "Interests" },
            { value: "references", label: "References" },
            { value: "fulltext", label: "Full Resume Text" }
        ];

        const headingToSectionMap = {
            "name": "name", "personal details": "name", "personal information": "name",
            "contact info": "name",
            "about me": "summary", "about": "summary", "summary": "summary",
            "career summary": "summary", "professional summary": "summary",
            "objective": "summary", "career objective": "summary", "introduction": "summary",
            "profile": "summary",
            "skills": "skills", "technical skills": "skills", "key skills": "skills",
            "core skills": "skills", "skill set": "skills", "skills summary": "skills",
            "technical expertise": "skills", "technologies": "skills",
            "tools & technologies": "skills", "software skills": "skills",
            "programming skills": "skills", "technology stack": "skills",
            "tech stack": "skills", "competencies": "skills", "it skills": "skills",
            "education": "education", "education qualification": "education",
            "educational qualifications": "education", "academic qualifications": "education",
            "education background": "education", "academic background": "education",
            "qualification": "education", "qualifications": "education",
            "experience": "experience", "work experience": "experience",
            "employment history": "experience", "professional experience": "experience",
            "work history": "experience", "employment": "experience",
            "internship": "experience", "internships": "experience",
            "projects": "projects", "project": "projects", "academic projects": "projects",
            "personal projects": "projects", "project experience": "projects", "project details": "projects",
            "certifications": "certifications", "certificates": "certifications",
            "certification": "certifications", "credentials": "certifications",
            "licenses": "certifications", "awards": "awards", "achievements": "awards",
            "honors": "awards", "recognition": "awards",
            "languages": "languages", "language skills": "languages",
            "languages known": "languages",
            "interests": "interests", "hobbies": "interests", "interests & hobbies": "interests",
            "educational background": "education", "trainings attended": "training",
            "references": "references", "referees": "references"
        };

        function mapHeadingToSection(headingText) {
            const normalized = headingText.toLowerCase().trim();
            if (headingToSectionMap[normalized]) return headingToSectionMap[normalized];
            for (const [key, value] of Object.entries(headingToSectionMap)) {
                if (normalized.includes(key) || key.includes(normalized)) return value;
            }
            return normalized;
        }

        const resumeFile = document.getElementById('resumeFile');
        const navUploadArea = document.getElementById('navUploadArea');
        const sectionSelect = document.getElementById('sectionSelect');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const loadingText = document.getElementById('loadingText');
        const detectedSections = document.getElementById('detectedSections');
        const resultBox = document.getElementById('resultBox');
        const leftColumn = document.getElementById('leftColumn');
        const rightColumn = document.getElementById('rightColumn');
        const mainContent = document.getElementById('mainContent');
        const navStatus = document.getElementById('navStatus');
        const fileNameDisplay = document.getElementById('fileName');
        resumeFile.addEventListener('change', handleFileSelect);

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            
      
            fileNameDisplay.textContent = file.name;
            
            window.latestResumeId = null;
            fullTextPdfExtracted = false;
            window.sectionState = {};
            window.allSectionsData = null;
            window.tableSectionsData = [];
            
           
            resetToSingleColumn();
            
            uploadFileAndDetectSections(file);
        }

        navUploadArea.addEventListener('dragover', function (e) {
            e.preventDefault();
            navUploadArea.classList.add('dragover');
        });

        navUploadArea.addEventListener('dragleave', function (e) {
            e.preventDefault();
            navUploadArea.classList.remove('dragover');
        });

        navUploadArea.addEventListener('drop', function (e) {
            e.preventDefault();
            navUploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) {
                resumeFile.files = e.dataTransfer.files;
                handleFileSelect({ target: { files: [file] } });
            }
        });

        navUploadArea.addEventListener('click', function () {
            resumeFile.click();
        });

        async function uploadFileAndDetectSections(file) {
            showLoading('Detecting sections...');
            updateNavStatus('processing', 'Processing...');
            sectionSelect.innerHTML = '<option value="">Detecting...</option>';

            const formData = new FormData();
            formData.append('resume', file);

            try {
                const response = await fetch('/detect-headings', { method: 'POST', body: formData });
                const data = await response.json();

                if (data.saved_resume_id || data.resume_id) {
                    window.latestResumeId = data.saved_resume_id || data.resume_id;
                }


                window.allSectionsData = data;
                hydrateSectionStateFromAllSections();

                hideLoading();
                updateNavStatus('ready', 'Ready');

                if (data.status === "success" && data.headings && data.headings.length > 0) {
                    populateSectionsFromHeadings(data.headings);
                    showDetectedSections(data.headings.length);
                }
                else {
                    populateDefaultSections();
                    showDetectedSections(0, true);
                }
            } catch (error) {
                hideLoading();
                updateNavStatus('error', 'Error');
                populateDefaultSections();
            }
        }

        function updateNavStatus(status, text) {
            navStatus.className = 'nav-status-badge status-' + status;
            navStatus.innerHTML = `<i class="fas fa-${status === 'processing' ? 'spinner fa-spin' : status === 'ready' ? 'circle' : status === 'error' ? 'exclamation-circle' : 'circle'}"></i> ${text}`;
        }

        function populateSectionsFromHeadings(headings) {
            sectionSelect.innerHTML = '<option value="">Select section</option>';
            const addedSections = new Set();

            headings.forEach(heading => {
                const sectionType = mapHeadingToSection(heading);
                if (!addedSections.has(sectionType)) {
                    addedSections.add(sectionType);
                    addSectionOption(sectionType);
                }
            });

            if (!addedSections.has("name")) addSectionOption("name");
            addSectionOption("fulltext", "Full Text (Plain)");
            addSectionOption("fulltext_layout", "Full Text (PDF)");
            
        }

        function addSectionOption(value, label) {
            const option = document.createElement('option');
            option.value = value;
            option.textContent = label || value.charAt(0).toUpperCase() + value.slice(1).replace(/-/g, ' ');
            sectionSelect.appendChild(option);
        }

        function populateDefaultSections() {
            sectionSelect.innerHTML = '<option value="">Select section</option>';
            defaultSections.forEach(section => addSectionOption(section.value, section.label));
        }

        function showDetectedSections(count, useDefault = false) {
            detectedSections.innerHTML = useDefault
                ? '<span class="detected-tag"><i class="fas fa-info-circle"></i> Standard</span>'
                : `<span class="detected-tag"><i class="fas fa-check-circle"></i> ${count} sections</span>`;
        }

        function showLoading(text) {
            loadingIndicator.style.display = 'block';
            loadingText.textContent = text;
            resultBox.style.display = 'none';
        }

        function hideLoading() {
            loadingIndicator.style.display = 'none';
        }

        window.allSectionsData = null;
        window.sectionState = {};

        function normalizeSectionKey(name) {
            return String(name || '').trim().toLowerCase().replace(/\s+/g, '-');
        }

        function toConfidenceFraction(value) {
            const n = Number(value);
            if (!Number.isFinite(n)) return 0;
            return n > 1 ? n / 100 : n;
        }

        function toConfidencePercent(value) {
            const n = Number(value);
            if (!Number.isFinite(n)) return 0;
            return n <= 1 ? Math.round(n * 1000) / 10 : Math.round(n * 10) / 10;
        }

        function getCanonicalSectionKey(input) {
            const mapped = mapHeadingToSection(String(input || ''));
            return normalizeSectionKey(mapped);
        }

        function setSectionState(sectionKey, content, confidence) {
            const key = getCanonicalSectionKey(sectionKey);
            window.sectionState[key] = {
                content: content || '',
                confidence: toConfidenceFraction(confidence),
                updatedAt: Date.now()
            };
            return key;
        }

        function getSectionState(sectionKey) {
            const key = getCanonicalSectionKey(sectionKey);
            return window.sectionState[key] || null;
        }

        function syncSectionInAllSectionsData(sectionKey, content, confidence) {
            if (!window.allSectionsData) {
                window.allSectionsData = {};
            }
            if (!Array.isArray(window.allSectionsData.all_sections)) {
                window.allSectionsData.all_sections = [];
            }

            const key = getCanonicalSectionKey(sectionKey);
            const confidencePercent = toConfidencePercent(confidence);
            const target = window.allSectionsData.all_sections.find(item =>
                getCanonicalSectionKey(item.section) === key
            );

            if (target) {
                target.content = content || '';
                if (confidencePercent > 0) target.confidence = confidencePercent;
                return;
            }

            const label = String(sectionKey || '').replace(/-/g, ' ').replace(/\b\w/g, m => m.toUpperCase());
            window.allSectionsData.all_sections.push({
                section: label,
                content: content || '',
                confidence: confidencePercent
            });
        }

        function hydrateSectionStateFromAllSections() {
            if (!window.allSectionsData || !Array.isArray(window.allSectionsData.all_sections)) return;
            window.allSectionsData.all_sections.forEach(item => {
                const key = getCanonicalSectionKey(item.section);
                setSectionState(key, item.content || '', item.confidence || 0);
            });
            if (window.allSectionsData.full_text) {
                setSectionState('fulltext', window.allSectionsData.full_text, 1);
            }
        }

        function getCanonicalSectionsList() {
            const source = Array.isArray(window.allSectionsData?.all_sections)
                ? window.allSectionsData.all_sections
                : [];
            return source.map(item => {
                const state = getSectionState(item.section);
                if (!state) return item;
                return {
                    ...item,
                    content: state.content || '',
                    confidence: toConfidencePercent(state.confidence)
                };
            });
        }

        function applyCorrectionToCanonicalState(fieldName, correctedValue, confidence) {
            const key = setSectionState(fieldName, correctedValue, confidence || getSectionState(fieldName)?.confidence || 1);
            syncSectionInAllSectionsData(key, correctedValue, confidence || getSectionState(key)?.confidence || 1);
            if (key === 'fulltext') {
                window.allSectionsData = window.allSectionsData || {};
                window.allSectionsData.full_text = correctedValue || '';
            }

            if (Array.isArray(window.tableSectionsData)) {
                window.tableSectionsData.forEach(item => {
                    if (getCanonicalSectionKey(item.section) === key) {
                        item.original = correctedValue;
                        if (confidence !== undefined && confidence !== null) {
                            item.confidence = toConfidencePercent(confidence);
                        }
                    }
                });
            }
        }

        sectionSelect.addEventListener('change', async function () {
            const selectedSection = sectionSelect.value;
            const file = resumeFile.files[0];
            if (!file || !selectedSection) return;

            const cachedState = getSectionState(selectedSection);
            if (cachedState && selectedSection !== "fulltext_layout") {
                if (selectedSection === 'fulltext') {
                    const sections = getCanonicalSectionsList();
                    showFullTextWithSections(cachedState.content || '', sections);
                } else {
                    showResults(cachedState.content || 'No data found', cachedState.confidence || 0, false);
                }
                updateNavStatus('ready', 'Ready');
                return;
            }

            showLoading('Extracting...');
            updateNavStatus('processing', 'Extracting...');

            if (selectedSection === "fulltext_layout") {
                await extractLayoutWithSections(file);
            } else {
                await extractSection(file, selectedSection);
            }
        });

        async function showAllSectionsTable() {
            hideLoading();
            updateNavStatus('ready', 'Ready');

            if (!window.allSectionsData || !window.allSectionsData.all_sections) {
                showError('Please upload a resume first to view all sections');
                return;
            }

            const sections = getCanonicalSectionsList();
            const fullText = window.allSectionsData.full_text || '';
            let tableHTML = `
                <div class="sections-table-container">
                    <div class="sections-summary">
                        <span class="badge bg-primary">${sections.length} Sections Detected</span>
                    </div>
                    <table class="sections-table">
                        <thead>
                            <tr>
                                <th>Section</th>
                                <th>Content</th>
                                <th>Confidence</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            sections.forEach(item => {
                const confidenceClass = item.confidence >= 70 ? 'high' : item.confidence >= 40 ? 'medium' : 'low';
                const contentPreview = item.content.length > 200 ? item.content.substring(0, 200) + '...' : item.content;
                tableHTML += `
                    <tr>
                        <td class="section-name">${item.section}</td>
                        <td class="section-content">${escapeHtml(contentPreview)}</td>
                        <td class="confidence-cell">
                            <span class="confidence-badge ${confidenceClass}">${item.confidence}%</span>
                        </td>
                    </tr>
                `;
            });

            tableHTML += `
                        </tbody>
                    </table>
                    ${fullText ? `
                    <div class="full-text-section">
                        <h4><i class="fas fa-file-alt"></i> Full Resume Text</h4>
                        <pre class="full-text-content">${escapeHtml(fullText)}</pre>
                    </div>
                    ` : ''}
                </div>
            `;

            const resultsContent = document.getElementById('resultsContent');
            resultsContent.innerHTML = tableHTML;
            resultsContent.style.background = 'white';

            document.getElementById('confidencePill').className = 'confidence-pill high';
            document.getElementById('confidencePill').innerHTML = '<i class="fas fa-check"></i> Complete';

            resultBox.style.display = 'block';
            document.getElementById('correctionBox').style.display = 'none';
            resetToSingleColumn();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function extractLayout(file) {
            const formData = new FormData();
            formData.append('resume', file);
            formData.append('format', 'html');

            try {
                const response = await fetch('/api/extract-layout', { method: 'POST', body: formData });
                const data = await response.json();
                hideLoading();

                if (data.status === "success" && data.html_output) {
                    showResults('', data.confidence || 0, true, data.html_output);
                } else {
                    showError('Could not extract layout');
                }
            } catch (error) {
                hideLoading();
                showError('Error extracting layout');
            }
        }


        async function extractLayoutWithSections(file) {
            const formData = new FormData();
            formData.append('resume', file);
            formData.append('format', 'html');

            try {
                const response = await fetch('/api/extract-layout', { method: 'POST', body: formData });
                const data = await response.json();
                hideLoading();
                updateNavStatus('ready', 'Ready');

                if (data.status === "success") {
                    const sections = getCanonicalSectionsList();
                    const plainText = data.plain_text || window.allSectionsData?.full_text || '';
                    const unifiedLayoutHtml = buildUnifiedLayoutFromSections(sections, plainText);

                    if (unifiedLayoutHtml && unifiedLayoutHtml.trim().length > 0) {
                        fullTextPdfExtracted = true;
                        showLayoutWithSections(unifiedLayoutHtml, sections);
                        showSectionsTable(sections);
                        enableTwoColumnLayout();
                    } else if (data.html_output && data.html_output.trim().length > 0) {
                        fullTextPdfExtracted = true;
                        showLayoutWithSections(data.html_output, sections);
                        showSectionsTable(sections);
                        enableTwoColumnLayout();
                    } else {
                        showError('Could not extract layout');
                    }
                } else {
                    showError('Could not extract layout');
                }
            } catch (error) {
                hideLoading();
                updateNavStatus('error', 'Error');
                showError('Error extracting layout');
            }
        }

        function buildFallbackLayoutHtml(plainText) {
            const safe = escapeHtml(plainText || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            const lines = safe.split('\n');
            const blocks = lines.map(line => {
                const trimmed = line.trim();
                if (!trimmed) return '<div class="section-content">&nbsp;</div>';
                if (trimmed.length <= 45 && /^[A-Za-z0-9&()\-\/\s:]+$/.test(trimmed)) {
                    return `<div class="section-title">${trimmed}</div>`;
                }
                return `<div class="section-content">${trimmed}</div>`;
            });
            return `<div class="page"><div class="resume-content">${blocks.join('')}</div></div>`;
        }

        function buildUnifiedLayoutFromSections(sections, plainText) {
            const sectionOrder = [
                'Name', 'Summary', 'Skills', 'Education', 'Experience', 'Projects',
                'Certifications', 'Awards', 'Achievements', 'Training', 'Languages',
                'Interests', 'Volunteer', 'Publications', 'References', 'Declaration',
                'Strengths', 'Contact', 'Email', 'Phone', 'Links'
            ];

            const byName = new Map();
            (sections || []).forEach(item => {
                if (!item || !item.section || !item.content) return;
                const key = String(item.section).trim();
                if (!key || byName.has(key)) return;
                byName.set(key, item.content);
            });

            const ordered = [];
            sectionOrder.forEach(name => {
                if (byName.has(name)) {
                    ordered.push({ section: name, content: byName.get(name) });
                    byName.delete(name);
                }
            });

            for (const [section, content] of byName.entries()) {
                ordered.push({ section, content });
            }

            if (ordered.length === 0) {
                return buildFallbackLayoutHtml(plainText || '');
            }

            const blocks = ordered.map(item => {
                const title = escapeHtml(item.section);
                const content = escapeHtml(item.content || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
                return `
                    <div class="section-title">${title}</div>
                    <div class="section-content">${content.replace(/\n/g, '<br>')}</div>
                `;
            });

            return `<div class="page"><div class="resume-content">${blocks.join('')}</div></div>`;
        }

        function enableTwoColumnLayout() {
            rightColumn.style.display = 'flex';
            mainContent.classList.add('two-column-view');
        }

        function resetToSingleColumn() {
            rightColumn.style.display = 'none';
            mainContent.classList.remove('two-column-view');
        }

        function showLayoutWithSections(layoutHtml, sections) {
            const resultsContent = document.getElementById('resultsContent');
            const normalizedLayout = normalizeLayoutHtml(layoutHtml);

            let html = `
                <div class="extraction-split-view-right">
                    <div class="extraction-panel pdf-panel">
                        <div class="panel-header">
                            <h4><i class="fas fa-file-pdf"></i> Full Resume (PDF Format)</h4>
                        </div>
                        <div class="panel-content layout-content">${normalizedLayout}</div>
                    </div>
                </div>
            `;

            resultsContent.innerHTML = html;
            resultsContent.style.background = 'white';

            document.getElementById('confidencePill').className = 'confidence-pill high';
            document.getElementById('confidencePill').innerHTML = '<i class="fas fa-check"></i> Complete';

            resultBox.style.display = 'block';
            document.getElementById('correctionBox').style.display = 'none';
        }

        function normalizeLayoutHtml(layoutHtml) {
            if (!layoutHtml || typeof layoutHtml !== 'string') return '';
            const parser = new DOMParser();
            const doc = parser.parseFromString(layoutHtml, 'text/html');

            doc.querySelectorAll('style, script, link, meta, title').forEach(node => node.remove());

            const body = doc.body ? doc.body.innerHTML : layoutHtml;
            return body || '';
        }


        async function extractSection(file, section) {
            const formData = new FormData();
            formData.append('resume', file);
            formData.append('section', section);

            try {
                const response = await fetch('/extract', { method: 'POST', body: formData });
                const data = await response.json();

                if (data.resume_id) window.latestResumeId = data.resume_id;
                hideLoading();
                updateNavStatus('ready', 'Ready');

               
                resetToSingleColumn();

                let resultContent = Array.isArray(data.result) ? data.result.join('\n') : (data.result || 'No data found');
                const resultConfidence = data.confidence || 0;
                setSectionState(section, resultContent, resultConfidence);
                syncSectionInAllSectionsData(section, resultContent, resultConfidence);
                if (section === 'fulltext') {
                    window.allSectionsData = window.allSectionsData || {};
                    window.allSectionsData.full_text = resultContent;
                }

                if (section === 'fulltext' && window.allSectionsData) {
                    showFullTextWithSections(resultContent, getCanonicalSectionsList());
                } else {
                    showResults(resultContent, resultConfidence, false);
                }
            } catch (error) {
                hideLoading();
                updateNavStatus('error', 'Error');
                showError('Error extracting section');
            }
        }

        function showFullTextWithSections(fullText, sections) {
            document.getElementById('fullTextViewBox').style.display = 'none';
            document.getElementById('tableViewBox').style.display = 'none';

            const resultsContent = document.getElementById('resultsContent');

            const headingPatterns = [];
            sections.forEach(section => {
                const sectionName = section.section.toLowerCase();
                headingPatterns.push({
                    name: section.section,
                    patterns: [
                        new RegExp(`\\b${sectionName}\\b`, 'gi'),
                        new RegExp(`\\b${sectionName.replace('-', ' ')}\\b`, 'gi')
                    ]
                });
            });

            let highlightedText = escapeHtml(fullText || 'No text available');
            headingPatterns.forEach(heading => {
                heading.patterns.forEach(pattern => {
                    highlightedText = highlightedText.replace(pattern,
                        `<span class="heading-highlight">${heading.name}</span>`);
                });
            });

            let html = `
                <div class="fulltext-split-center">
                    <div class="panel-header">
                        <h4><i class="fas fa-file-alt"></i> Full Resume Text</h4>
                    </div>
                    <div class="panel-content">
                        <div class="highlighted-text">${highlightedText}</div>
                    </div>
                </div>
            `;

            resultsContent.innerHTML = html;
            resultsContent.style.background = 'transparent';

            document.getElementById('confidencePill').className = 'confidence-pill high';
            document.getElementById('confidencePill').innerHTML = '<i class="fas fa-check"></i> Complete';

            resultBox.style.display = 'block';
            document.getElementById('correctionBox').style.display = 'none';

        }

        function showFullTextInRightColumn(fullText) {
            const fullTextViewBox = document.getElementById('fullTextViewBox');
            const fullTextViewContent = document.getElementById('fullTextViewContent');

            if (!fullText || fullText.trim() === '') {
                fullTextViewBox.style.display = 'none';
                return;
            }

            const headingPatterns = [];
            const sections = getCanonicalSectionsList();
            sections.forEach(section => {
                const sectionName = section.section.toLowerCase();
                headingPatterns.push({
                    name: section.section,
                    patterns: [
                        new RegExp(`\\b${sectionName}\\b`, 'gi'),
                        new RegExp(`\\b${sectionName.replace('-', ' ')}\\b`, 'gi')
                    ]
                });
            });

            let highlightedText = escapeHtml(fullText);
            headingPatterns.forEach(heading => {
                heading.patterns.forEach(pattern => {
                    highlightedText = highlightedText.replace(pattern,
                        `<span class="heading-highlight">${heading.name}</span>`);
                });
            });

            let fullTextHTML = `
                <div class="full-text-view-container">
                    <div class="full-text-scroll">
                        <pre class="full-text-content">${highlightedText}</pre>
                    </div>
                </div>
            `;

            fullTextViewContent.innerHTML = fullTextHTML;
            fullTextViewBox.style.display = 'block';
        }

        function showSectionsTable(sections) {
            const tableViewBox = document.getElementById('tableViewBox');
            const tableViewContent = document.getElementById('tableViewContent');

            const canonicalSections = Array.isArray(sections) ? sections : [];
            if (!canonicalSections || canonicalSections.length === 0) {
                tableViewBox.style.display = 'none';
                return;
            }

            canonicalSections.forEach(item => {
                setSectionState(item.section, item.content || '', item.confidence || 0);
            });

            window.tableSectionsData = canonicalSections.map(item => ({
                section: item.section,
                original: item.content || '',
                confidence: item.confidence
            }));

            let tableHTML = `
                <div class="sections-summary-right">
                </div>
                <table class="sections-table" id="editableSectionsTable">
                    <thead>
                        <tr>
                            <th>Section</th>
                            <th>Original Content</th>
                            <th>Correction</th>
                            <th>Confidence</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            canonicalSections.forEach((item, index) => {
                const confidenceClass = item.confidence >= 70 ? 'high' : item.confidence >= 40 ? 'medium' : 'low';
                const contentId = `content-${index}`;
                const correctionId = `correction-${index}`;
                const originalContent = escapeHtml(item.content);
                
                tableHTML += `
                    <tr data-section="${item.section}" data-index="${index}">
                        <td class="section-name">${item.section}</td>
                        <td class="section-content" id="${contentId}">${originalContent}</td>
                        <td class="correction-cell">
                            <input type="text" class="correction-input" id="${correctionId}" placeholder="Enter correction...">
                        </td>
                        <td class="confidence-cell">
                            <span class="confidence-badge ${confidenceClass}">${item.confidence}%</span>
                        </td>
                    </tr>
                `;
            });

            tableHTML += `
                    </tbody>
                </table>
                <div class="table-actions">
                    <button class="submit-all-btn" onclick="submitAllCorrections()">
                        <i class="fas fa-check-circle"></i> Submit All Corrections
                    </button>
                </div>
            `;

            tableViewContent.innerHTML = tableHTML;
            tableViewBox.style.display = 'block';
        }

        function submitAllCorrections() {
            const rows = document.querySelectorAll('#editableSectionsTable tbody tr');
            const corrections = [];
            let emptyCount = 0;
            
            rows.forEach((row, index) => {
                const sectionName = row.dataset.section;
                const originalContent = (window.tableSectionsData && window.tableSectionsData[index])
                    ? window.tableSectionsData[index].original
                    : '';
                const correctionInput = row.querySelector('.correction-input');
                const correctedContent = correctionInput.value.trim();
                
                if (!correctedContent) {
                    emptyCount++;
                    return;
                }
                
                if (originalContent.trim() === correctedContent.trim()) {
                    return;
                }

                corrections.push({
                    rowIndex: index,
                    field_name: sectionName,
                    original_value: originalContent,
                    corrected_value: correctedContent,
                    feedback_type: 'correction',
                    confidence_before: 0.5,
                    comment: 'Table inline correction'
                });
            });
            
            if (corrections.length === 0 && emptyCount > 0) {
                showNotification('Please enter at least one correction value', 'error');
            } else if (corrections.length === 0) {
                showNotification('No changes to submit', 'info');
            } else {
                const resumeId = window.latestResumeId || 0;
                submitBatchTableCorrections(resumeId, corrections);
            }
        }

        async function submitBatchTableCorrections(resumeId, corrections) {
            try {
                const payload = {
                    resume_id: resumeId,
                    source: 'table_edit_batch',
                    session_id: 'session_' + Date.now(),
                    auto_deploy: true,
                    corrections: corrections.map(item => ({
                        field_name: item.field_name,
                        original_value: item.original_value,
                        corrected_value: item.corrected_value,
                        feedback_type: item.feedback_type,
                        confidence_before: item.confidence_before,
                        comment: item.comment
                    }))
                };

                const response = await fetch('/api/feedback/batch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (!response.ok || data.status !== 'success') {
                    const message = data?.message || 'Batch correction failed';
                    showNotification('Error: ' + message, 'error');
                    return;
                }

                const byIndex = new Map();
                (data.items || []).forEach(item => {
                    if (typeof item.index === 'number') {
                        byIndex.set(item.index, item);
                    }
                });

                let savedCount = 0;
                corrections.forEach((entry, localIdx) => {
                    const row = document.querySelector(`tr[data-index="${entry.rowIndex}"]`);
                    if (!row) return;

                    const backendItem = byIndex.get(localIdx);
                    if (!backendItem || backendItem.status !== 'saved') {
                        return;
                    }

                    savedCount++;
                    row.classList.add('corrected');
                    row.dataset.originalStored = entry.corrected_value;
                    if (window.tableSectionsData && window.tableSectionsData[entry.rowIndex]) {
                        window.tableSectionsData[entry.rowIndex].original = entry.corrected_value;
                    }
                    applyCorrectionToCanonicalState(entry.field_name, entry.corrected_value, 1);
                    const contentCell = row.querySelector('.section-content');
                    if (contentCell) contentCell.classList.remove('modified');
                    const correctionInput = row.querySelector('.correction-input');
                    if (correctionInput) correctionInput.value = '';
                });

                if (savedCount > 0) {
                    showNotification(`Corrections submitted successfully (${savedCount})`, 'success');
                } else {
                    showNotification('No corrections were saved. Check values and try again.', 'error');
                }
            } catch (err) {
                showNotification('Failed to submit corrections', 'error');
            }
        }

        function submitTableCorrectionByIndex(index) {
            const row = document.querySelector(`tr[data-index="${index}"]`);
            const sectionName = row.dataset.section;
            const originalContent = (window.tableSectionsData && window.tableSectionsData[index])
                ? window.tableSectionsData[index].original
                : '';
            const correctionInput = row.querySelector('.correction-input');
            const correctedContent = correctionInput.value.trim();
            
            const resumeId = window.latestResumeId || 0;
           
            if (!correctedContent) {
                showNotification('Please enter a correction value', 'error');
                return;
            }
            
        
            if (originalContent.trim() === correctedContent.trim()) {
                showNotification('Correction is the same as original', 'info');
                return;
            }
            
            submitTableCorrection(resumeId, sectionName, originalContent, correctedContent, index);
        }

        function editRow(index) {
            const row = document.querySelector(`tr[data-index="${index}"]`);
            const contentCell = row.querySelector('.section-content');
            const editBtn = row.querySelector('.edit-btn');
            const saveBtn = row.querySelector('.save-btn');
            const cancelBtn = row.querySelector('.cancel-btn');
            
            if (!row.dataset.originalStored) {
                row.dataset.originalStored = contentCell.innerText;
            }
            
            contentCell.contentEditable = true;
            contentCell.classList.add('editing');
            contentCell.focus();
            
            editBtn.style.display = 'none';
            saveBtn.style.display = 'inline-block';
            cancelBtn.style.display = 'inline-block';
        }

        function cancelEditRow(index) {
            const row = document.querySelector(`tr[data-index="${index}"]`);
            const contentCell = row.querySelector('.section-content');
            const editBtn = row.querySelector('.edit-btn');
            const saveBtn = row.querySelector('.save-btn');
            const cancelBtn = row.querySelector('.cancel-btn');
            
            const fallbackOriginal = (window.tableSectionsData && window.tableSectionsData[index])
                ? window.tableSectionsData[index].original
                : '';
            contentCell.innerText = row.dataset.originalStored || fallbackOriginal;
            contentCell.contentEditable = false;
            contentCell.classList.remove('editing');
            contentCell.classList.remove('modified');
            
            editBtn.style.display = 'inline-block';
            saveBtn.style.display = 'none';
            cancelBtn.style.display = 'none';
        }

        function saveRow(index) {
            const row = document.querySelector(`tr[data-index="${index}"]`);
            const contentCell = row.querySelector('.section-content');
            const editBtn = row.querySelector('.edit-btn');
            const saveBtn = row.querySelector('.save-btn');
            const cancelBtn = row.querySelector('.cancel-btn');
            
            contentCell.contentEditable = false;
            contentCell.classList.remove('editing');
            contentCell.classList.add('modified');
            
            editBtn.style.display = 'inline-block';
            saveBtn.style.display = 'none';
            cancelBtn.style.display = 'none';
            
            showNotification('Changes saved locally. Click Submit Correction to save permanently.', 'success');
        }

        function correctRow(index) {
            const row = document.querySelector(`tr[data-index="${index}"]`);
            const sectionName = row.dataset.section;
            const originalContent = (window.tableSectionsData && window.tableSectionsData[index])
                ? window.tableSectionsData[index].original
                : '';
            const correctedContent = row.querySelector('.section-content').innerText;
            
            const resumeId = window.latestResumeId || 0;
           
            if (originalContent.trim() === correctedContent.trim()) {
                showNotification('No changes to submit.', 'info');
                return;
            }
            
            submitTableCorrection(resumeId, sectionName, originalContent, correctedContent, index);
        }

        async function submitTableCorrection(resumeId, fieldName, originalValue, correctedValue, rowIndex) {
            try {
                const response = await fetch('/api/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        resume_id: resumeId,
                        field_name: fieldName,
                        original_value: originalValue,
                        corrected_value: correctedValue,
                        feedback_type: 'correction',
                        confidence_before: 0.5,
                        source: 'table_edit',
                        session_id: 'session_' + Date.now(),
                        comment: 'Table inline correction',
                        auto_deploy: true
                    })
                });

                const feedbackData = await response.json();
                if (feedbackData.status === 'success') {
                   
                    const row = document.querySelector(`tr[data-index="${rowIndex}"]`);
                    row.classList.add('corrected');
                    row.dataset.originalStored = correctedValue;
                    if (window.tableSectionsData && window.tableSectionsData[rowIndex]) {
                        window.tableSectionsData[rowIndex].original = correctedValue;
                    }
                    applyCorrectionToCanonicalState(fieldName, correctedValue, 1);
                    row.querySelector('.section-content').classList.remove('modified');
                    
                    showNotification('Correction submitted successfully!', 'success');
                } else {
                    showNotification('Error: ' + feedbackData.message, 'error');
                }
            } catch (err) {
                showNotification('Failed to submit correction', 'error');
            }
        }

        function showNotification(message, type) {
            // Remove existing notification if any
            const existing = document.querySelector('.table-notification');
            if (existing) existing.remove();
            
            const notification = document.createElement('div');
            notification.className = `table-notification notification-${type}`;
            notification.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i>
                ${message}
            `;
            
            const tableContainer = document.querySelector('.table-view-content');
            if (tableContainer) {
                tableContainer.insertBefore(notification, tableContainer.firstChild);
                setTimeout(() => notification.remove(), 4000);
            }
        }

        function showResults(content, confidence, isLayout = false, htmlContent = '') {
            // Reset to single column for regular results
            resetToSingleColumn();

            document.getElementById('fullTextViewBox').style.display = 'none';
            document.getElementById('tableViewBox').style.display = 'none';

            const confidencePercent = Math.round(confidence * 100);
            const confidencePill = document.getElementById('confidencePill');

            confidencePill.className = 'confidence-pill ' + (confidencePercent >= 70 ? 'high' : confidencePercent >= 40 ? 'medium' : 'low');
            confidencePill.innerHTML = `<i class="fas fa-${confidencePercent >= 70 ? 'check' : confidencePercent >= 40 ? 'exclamation' : 'times'}"></i> ${confidencePercent}%`;

            const resultsContent = document.getElementById('resultsContent');

            if (isLayout && htmlContent) {
                resultsContent.innerHTML = htmlContent;
                resultsContent.style.background = 'white';
            } else {
                resultsContent.textContent = content;
                resultsContent.style.background = '';
            }

            document.getElementById('correctionBox').style.display = 'block';
            document.getElementById('originalValue').textContent = content.substring(0, 80) + (content.length > 80 ? '...' : '');
            resultBox.style.display = 'block';
            window.currentExtraction = { content, confidence, section: sectionSelect.value, resume_id: window.latestResumeId };
        }

        function showError(message) {
            resultBox.style.display = 'block';
            document.getElementById('resultsContent').innerHTML = `<div class="alert alert-danger">${message}</div>`;
        }

        document.getElementById('submitCorrection').addEventListener('click', async function () {
            const corrected = document.getElementById('correctedValue').value.trim();
            if (!corrected) { alert('Please enter a value'); return; }

            const data = window.currentExtraction;
            try {
                const response = await fetch('/api/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        resume_id: data?.resume_id || window.latestResumeId || 0,
                        field_name: data?.section || 'unknown',
                        original_value: data?.content || '',
                        corrected_value: corrected,
                        feedback_type: 'correction',
                        confidence_before: data?.confidence || 0,
                        source: 'single_section',
                        session_id: 'session_' + Date.now(),
                        comment: '',
                        auto_deploy: true
                    })
                });

                const feedbackData = await response.json();
                if (feedbackData.status === 'success') {
                    alert('Correction submitted! Thank you for helping us improve.');
                    document.getElementById('correctedValue').value = '';
                    if (window.currentExtraction) {
                        window.currentExtraction.content = corrected;
                    }
                    applyCorrectionToCanonicalState(data?.section || 'unknown', corrected, data?.confidence || 1);
                    document.getElementById('originalValue').textContent =
                        corrected.substring(0, 80) + (corrected.length > 80 ? '...' : '');
                    const resultsContent = document.getElementById('resultsContent');
                    if (resultsContent) {
                        resultsContent.textContent = corrected;
                    }
                } else {
                    alert('Error: ' + feedbackData.message);
                }
            } catch (err) {
                alert('Failed to submit correction');
            }
        });
    </script>
